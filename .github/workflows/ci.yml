name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CI tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          npm install -g markdownlint-cli2

      - name: Validate skill and agent structure
        run: bash scripts/validate.sh

      - name: Lint skills (skill-check)
        run: npx --yes skill-check check . --no-security-scan --fail-on-warning --format github

      - name: Lint markdown
        run: markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Lint shell scripts
        run: find . -name '*.sh' -not -path './node_modules/*' -print0 | xargs -0 shellcheck
