name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skill and agent structure
        run: bash scripts/validate.sh

      - name: Lint markdown
        run: npx markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Lint shell scripts
        run: find . -name '*.sh' -not -path './node_modules/*' -print0 | xargs -0 shellcheck
